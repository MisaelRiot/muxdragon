# set tmux leader
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# windows numbering
set -g base-index 1
setw -g pane-base-index 1

# reload config
bind r source-file ~/.config/tmux/.tmux.conf

# create panels
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# move to panels without prefix
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

# copymode like nvim
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-track-selection
bind-key -T copy-mode-vi y send-copy-selection-and-cancel
bind Escape copy-mode

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'fabioluciano/tmux-powerkit'

# powerkit themes config
set -g @powerkit_plugins "disk,datetime,cpu,memory,git,hostname"
set -g @powerkit_theme "nord"
set -g @powerkit_theme_variant "dark"

run '~/.config/tmux/plugins/tpm/tpm'
